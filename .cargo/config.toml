[build]
target = "x86_64-unknown-linux-gnu"

[target.x86_64-unknown-linux-gnu]
rustflags = [
    # fully static, but keep PIE: eyra's experimental-relocate self-relocates,
    # so no PT_INTERP while .dynsym survives for --export-dynamic. the link
    # args themselves live in build.rs so registry installs get them too;
    # build.rs refuses to build without this flag.
    "-C", "target-feature=+crt-static",
]
