name: carrot-git

# the aur carrot-git package builds latest main of carrot + taproot on
# stable rust; this job is that exact build, run on every commit, plus
# the gates that make the artifact trustworthy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: deps
        run: pacman -Syu --noconfirm rust gcc git binutils xkeyboard-config openssh

      # full history: the aur pkgver counts every commit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: taproot at main
        run: git clone --depth 1 https://github.com/carrot-wm/taproot ../taproot

      - name: build carrot
        run: cargo build --release --locked

      - name: build the libc family
        run: |
          cd ../taproot
          cargo build --release --locked -p taproot -p taproot-stub
          bin="$GITHUB_WORKSPACE/target/x86_64-unknown-linux-gnu/release"
          cp target/release/libtaproot.so "$bin/libc.so.6"
          cp target/release/libtaproot.so "$bin/libm.so.6"
          for s in libpthread.so.0 libdl.so.2 librt.so.1 libutil.so.1 libresolv.so.2 ld-linux-x86-64.so.2; do
            cp target/release/libtaproot_stub.so "$bin/$s"
          done

      - name: gates
        run: |
          b=target/x86_64-unknown-linux-gnu/release/carrot
          readelf -h "$b" | grep -q DYN
          ! readelf -l "$b" | grep -q INTERP
          test "$(strings -a "$b" | grep -c GLIBC_2)" = 0
          for sym in memcpy memset memmove malloc free ceil sqrt getauxval _start snprintf; do
            nm -D --defined-only target/x86_64-unknown-linux-gnu/release/libc.so.6 | grep -qw "$sym"
          done
          # and no unresolvable imports: GNU ld defines no __init/fini_array
          # bounds for a shared library, and any strong undefined dynsym
          # here fails preload on loaders without the stub backstop
          test "$(nm -D --undefined-only target/x86_64-unknown-linux-gnu/release/libc.so.6 | grep -c ' U ')" = 0

      # the suite runs panic = "unwind" here (no build-std), which the
      # zero-C stack can't unwind to completion; compile it to catch
      # breakage and leave the behavioral run to the dev lane
      - name: tests compile
        run: cargo test --release --locked --no-run

      # a green build IS the aur update: bump the pkgver the page shows
      # so helpers see the new revision without --devel. inert until the
      # AUR_SSH_PRIVATE_KEY secret exists
      - name: publish the pkgver to the aur
        if: env.AUR_KEY != ''
        run: |
          # the checkout is owned by the runner uid, not the container's
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          # absolute paths: the shell HOME and ssh tilde expansion disagree in container jobs
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o IdentitiesOnly=yes"
          ver="r$(git rev-list --count HEAD).$(git rev-parse --short HEAD)"
          git clone ssh://aur@aur.archlinux.org/carrot-git.git /tmp/aur
          cd /tmp/aur
          sed -i "s/^pkgver=.*/pkgver=$ver/" PKGBUILD
          sed -i "s/^\tpkgver = .*/\tpkgver = $ver/" .SRCINFO
          git config user.name "Bunny"
          git config user.email "bunny@carrotwm.org"
          git diff --quiet || { git commit -qam "bump to $ver"; git push -q; }
